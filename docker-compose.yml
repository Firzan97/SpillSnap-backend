version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spendsnap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spendsnap
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spendsnap
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: spendsnap_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
