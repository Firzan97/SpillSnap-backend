name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual run from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false # never interrupt an in-flight deploy

jobs:
  # Gate: fail the deploy if the code doesn't compile / lint.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  deploy:
    needs: build
    # Self-hosted runner = a MacBook on a MY residential IP. SSH from here to the
    # VPS is NOT filtered the way GitHub's Azure runner IPs are by Exabytes (the
    # old ubuntu-latest runner kept hitting `dial :22 i/o timeout`). CLERK_*
    # secrets are forwarded (envs) and upserted into the VPS .env by deploy.sh;
    # other secrets already live on the box.
    runs-on: self-hosted
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 15m
          script_stop: true
          envs: CLERK_SECRET_KEY,CLERK_ISSUER
          script: |
            cd /opt/spillsnap-backend
            git config --global --add safe.directory /opt/spillsnap-backend || true
            export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes -i /root/.ssh/vps_to_github"
            git fetch origin main && git reset --hard origin/main
            ./deploy/deploy.sh
